<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Calibraciones - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Acceso Equipos Mansis</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="nombre@correo.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Entrar</button>
            
            <div class="text-center">
                <button onclick="resetPassword()" class="text-xs text-slate-400 hover:text-blue-600 transition-colors underline decoration-slate-200 underline-offset-4">
                    ¿Has olvidado tu contraseña?
                </button>
            </div>
        </div>

        <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <script>
        const _URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZnhzc3ltYW9jYmR0dXVwZHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDg4NDcsImV4cCI6MjA5MDAyNDg0N30.inKq_vCajv8xxTzCDQYaFEMOckUWJZF0plgCBA4YPEo';
        
        const client = supabase.createClient(_URL, _KEY);

        async function resetPassword() {
            // Intentamos coger el email del input si ya lo han escrito
            let email = document.getElementById('email').value;
            
            if (!email) {
                email = prompt("Introduce tu correo para recibir el enlace de recuperación:");
            }
            
            if (!email) return; // Si cancela o sigue vacío

            const { error } = await client.auth.resetPasswordForEmail(email, {
                // Usamos tu URL configurada en Vercel
                redirectTo: 'https://gestor-calibraciones.vercel.app/cambiar-clave.html',
            });

            if (error) {
                showMsg("Error: " + error.message, 'text-red-600');
            } else {
                showMsg("Te hemos enviado un link de recuperación a " + email, 'text-green-600 font-bold');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMsg("Por favor, rellena todos los campos", 'text-orange-600');
                return;
            }

            showMsg("Verificando...", 'text-blue-600');

            const { data, error } = await client.auth.signInWithPassword({ 
                email: email, 
                password: password 
            });
            
            if (error) {
                showMsg("Error: " + error.message, 'text-red-600');
            } else {
                showMsg('¡Acceso correcto! Entrando...', 'text-green-600');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        }

        function showMsg(text, color) {
            const el = document.getElementById('msg');
            el.innerText = text;
            el.className = 'mt-4 text-center text-sm font-medium ' + color;
        }
    </script>
</body>
</html>
