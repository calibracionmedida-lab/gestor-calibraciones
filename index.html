<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Calibraciones - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div id="app" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Acceso Equipos Mansis</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Entrar</button>
            
            <button onclick="handleSignUp()" class="w-full border border-blue-600 text-blue-600 py-3 rounded-lg font-semibold hover:bg-blue-50 transition">Dar de alta nuevo usuario</button>
        </div>

        <p id="msg" class="mt-4 text-center text-sm font-medium"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const SUPABASE_KEY = 'TU_CLAVE_ANON_AQUI'; // <--- PEGA TU CLAVE COMPLETA AQUÍ
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                showMsg(error.message, 'text-red-600');
            } else {
                showMsg('Usuario registrado correctamente. Ya puedes entrar.', 'text-green-600');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                showMsg(error.message, 'text-red-600');
            } else {
                showMsg('¡Entrando al sistema...', 'text-green-600');
                // Aquí podrías redirigir a la página de la tabla de equipos
            }
        }

        function showMsg(text, color) {
            const el = document.getElementById('msg');
            el.innerText = text;
            el.className = 'mt-4 text-center text-sm font-medium ' + color;
        }
    </script>
</body>
</html>
