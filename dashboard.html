<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mansis Lab - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(254, 226, 226, 1); color: rgba(220, 38, 38, 1); }
            50% { background-color: rgba(220, 38, 38, 1); color: white; }
        }
        .animate-pulse-red { animation: pulse-red 2s infinite; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen z-20">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fa-solid fa-microchip text-white"></i></div>
            <h1 class="text-xl font-bold text-blue-400">Mansis Lab</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('inventario')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3 active:scale-95">
                <i class="fa-solid fa-list w-5 text-blue-400"></i> Inventario
            </button>
            <button onclick="showSection('calendario')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3 active:scale-95">
                <i class="fa-solid fa-calendar-days w-5 text-blue-400"></i> Calendario
            </button>
            <button onclick="location.href='settings.html'" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3 mt-8 border border-slate-700">
                <i class="fa-solid fa-users-gear w-5 text-slate-400"></i> Ajustes
            </button>
        </nav>
        <button onclick="logout()" class="p-6 text-slate-400 hover:text-red-400 text-left border-t border-slate-800 transition-colors">
            <i class="fa-solid fa-power-off mr-2"></i> Salir
        </button>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div class="bg-white p-4 border-b border-slate-200 shadow-sm flex gap-4 items-end z-10">
            <div class="flex-1">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Buscador</label>
                <input type="text" id="f_general" oninput="aplicarFiltros()" placeholder="Nombre o Código..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>
            <div class="w-56">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1">Centro (GFH)</label>
                <select id="f_gfh" onchange="aplicarFiltros()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                    <option value="">TODOS LOS CENTROS</option>
                    <option value="TS-L5">TS-L5 (Clínico)</option>
                    <option value="TS-L7">TS-L7 (La Fe)</option>
                    <option value="TS-L15">TS-L15 (Alicante)</option>
                    <option value="TS-L17">TS-L17 (Orihuela)</option>
                    <option value="TS001">TS001 (Oficina)</option>
                </select>
            </div>
            <div class="w-56 h-[46px] flex items-center">
                <label class="flex items-center gap-2 p-2.5 w-full bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 transition-all">
                    <input type="checkbox" id="f_solo_calib" onchange="aplicarFiltros()" class="w-4 h-4 rounded text-blue-600">
                    <span class="text-xs font-bold text-slate-600 uppercase">Solo Calibrables</span>
                </label>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6">
            <section id="sec-inventario">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200">
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Equipo / Código</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Ubicación</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Última Cal.</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Próxima Revisión</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase">Estado</th>
                                <th class="p-4 text-[10px] font-black text-slate-400 uppercase text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-calendario" class="hidden h-full">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full" id="calendar-container"></div>
            </section>
        </div>
    </main>

    <div id="modal-edit" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex justify-end backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl animate-[slideIn_0.3s_ease-out] flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-slate-800">Editar Equipo</h3>
                <button onclick="closeEdit()" class="text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-circle-xmark text-3xl"></i></button>
            </div>
            <form class="space-y-6 flex-1">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Identificación</label>
                    <input type="text" id="edit-nombre" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-700" readonly>
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Fecha Última Calibración</label>
                    <input type="text" id="edit-fecha" placeholder="DD/MM/YYYY" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-2">Estado del Equipo</label>
                    <select id="edit-estado" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="DISPONIBLE">DISPONIBLE</option>
                        <option value="EN REPARACIÓN">EN REPARACIÓN</option>
                        <option value="BAJA">BAJA</option>
                    </select>
                </div>
                <button type="button" onclick="guardarCambios()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all mt-10">
                    Actualizar Datos
                </button>
            </form>
        </div>
    </div>

    <script>
        const _URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZnhzc3ltYW9jYmR0dXVwZHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDg4NDcsImV4cCI6MjA5MDAyNDg0N30.inKq_vCajv8xxTzCDQYaFEMOckUWJZF0plgCBA4YPEo'; 
        const client = supabase.createClient(_URL, _KEY);
        let calendar;

        function calcularProxima(fechaStr) {
            if (!fechaStr || fechaStr === '-' || fechaStr === 'No') return { fecha: 'Pendiente', clase: 'text-slate-300 italic' };
            try {
                const p = fechaStr.split('/');
                const fecha = new Date(p[2], p[1]-1, p[0]);
                fecha.setFullYear(fecha.getFullYear() + 1);
                
                const hoy = new Date();
                const diffMeses = (fecha - hoy) / (1000 * 60 * 60 * 24 * 30);
                
                if (diffMeses < 0) return { fecha: fecha.toLocaleDateString('es-ES'), clase: 'px-2 py-1 rounded-lg animate-pulse-red font-bold' };
                if (diffMeses < 2) return { fecha: fecha.toLocaleDateString('es-ES'), clase: 'text-orange-500 font-bold' };
                return { fecha: fecha.toLocaleDateString('es-ES'), clase: 'text-green-600 font-bold' };
            } catch(e) { return { fecha: 'Error', clase: 'text-red-200' }; }
        }

        function showSection(id) {
            document.getElementById('sec-inventario').classList.toggle('hidden', id !== 'inventario');
            document.getElementById('sec-calendario').classList.toggle('hidden', id !== 'calendario');
            if(id === 'calendario') initCalendar();
        }

        function aplicarFiltros() { cargarTabla(); if(calendar) calendar.refetchEvents(); }

        async function cargarTabla() {
            const body = document.getElementById('tabla-body');
            body.innerHTML = '<tr><td colspan="6" class="p-10 text-center"><i class="fa-solid fa-sync fa-spin text-blue-500 text-2xl"></i></td></tr>';
            
            const f_gen = document.getElementById('f_general').value;
            const f_gfh = document.getElementById('f_gfh').value;
            const soloCalib = document.getElementById('f_solo_calib').checked;

            let query = client.from('equipos').select('*');
            if(f_gen) query = query.or(`Código.ilike.%${f_gen}%,Nombre.ilike.%${f_gen}%`);
            if(f_gfh) query = query.ilike('GFH', `%${f_gfh}%`);
            if(soloCalib) query = query.eq('Equipos con calibración', 'Sí');

            const { data } = await query.limit(100);
            body.innerHTML = data.map(item => {
                const prox = calcularProxima(item['Fecha cal.']);
                const estado = item.Estado || 'S/D';
                return `
                <tr class="hover:bg-blue-50/50 transition-all group">
                    <td class="p-4">
                        <div class="font-bold text-slate-800">${item.Nombre}</div>
                        <div class="text-[10px] font-mono text-blue-500">${item.Código}</div>
                    </td>
                    <td class="p-4 text-sm text-slate-600 font-medium">${item.GFH || '-'}</td>
                    <td class="p-4 text-xs text-slate-400 font-mono">${item['Fecha cal.'] || '-'}</td>
                    <td class="p-4 text-sm"><span class="${prox.clase}">${prox.fecha}</span></td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${estado === 'DISPONIBLE' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}">
                            ${estado}
                        </span>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick='openEdit(${JSON.stringify(item)})' class="text-slate-300 hover:text-blue-600 p-2 rounded-xl hover:bg-blue-100 transition-all">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function initCalendar() {
            const calEl = document.getElementById('calendar-container');
            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                events: async function(info, success, failure) {
                    const { data } = await client.from('equipos').select('*').not('"Fecha cal."', 'is', null);
                    success(data.filter(e => e['Fecha cal.'] && e['Fecha cal.'] !== '-').map(e => {
                        const p = e['Fecha cal.'].split('/');
                        const f = new Date(p[2], p[1]-1, p[0]);
                        f.setFullYear(f.getFullYear() + 1);
                        return { title: e.Nombre, start: f.toISOString().split('T')[0], color: f < new Date() ? '#ef4444' : '#3b82f6' };
                    }));
                }
            });
            calendar.render();
        }

        function openEdit(item) {
            document.getElementById('edit-id').value = item.id || item.Código;
            document.getElementById('edit-nombre').value = item.Nombre;
            document.getElementById('edit-fecha').value = item['Fecha cal.'] || '';
            document.getElementById('edit-estado').value = item.Estado || 'DISPONIBLE';
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function closeEdit() { document.getElementById('modal-edit').classList.add('hidden'); }

        async function guardarCambios() {
            const id = document.getElementById('edit-id').value;
            const f = document.getElementById('edit-fecha').value;
            const e = document.getElementById('edit-estado').value;
            const { error } = await client.from('equipos').update({ 'Fecha cal.': f, 'Estado': e }).eq('Código', id);
            if(error) alert(error.message); else { closeEdit(); aplicarFiltros(); }
        }

        async function logout() { await client.auth.signOut(); location.href='index.html'; }
        cargarTabla();
    </script>
</body>
</html>
