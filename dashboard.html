<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mansis Lab - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen shadow-xl z-20">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold text-blue-400"><i class="fa-solid fa-microchip mr-2"></i>Mansis Lab</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('inventario')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 focus:bg-blue-600 transition-colors flex items-center gap-3">
                <i class="fa-solid fa-list w-5"></i> Inventario
            </button>
            <button onclick="showSection('calendario')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 focus:bg-blue-600 transition-colors flex items-center gap-3">
                <i class="fa-solid fa-calendar-days w-5"></i> Calendario
            </button>
            <button onclick="location.href='settings.html'" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center gap-3 mt-8 border border-slate-700">
                <i class="fa-solid fa-users-gear w-5"></i> Ajustes / Admin
            </button>
        </nav>
        <button onclick="logout()" class="p-6 text-slate-400 hover:text-white text-left border-t border-slate-800">
            <i class="fa-solid fa-power-off mr-2"></i> Cerrar Sesión
        </button>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <div class="bg-white p-4 border-b border-slate-200 shadow-sm flex gap-4 items-end z-10">
            <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 mb-1">Buscar Equipo</label>
                <input type="text" id="f_general" oninput="aplicarFiltros()" placeholder="Código o Nombre..." class="w-full p-2 border rounded-lg bg-slate-50">
            </div>
            <div class="w-48">
                <label class="block text-xs font-bold text-slate-500 mb-1">Centro (GFH)</label>
                <select id="f_gfh" onchange="aplicarFiltros()" class="w-full p-2 border rounded-lg bg-slate-50 cursor-pointer">
                    <option value="">Todos los centros</option>
                    <option value="TS-L5">TS-L5 (Clínico)</option>
                    <option value="TS-L7">TS-L7 (La Fe)</option>
                    <option value="TS-L15">TS-L15 (Alicante)</option>
                    <option value="TS-L17">TS-L17 (Orihuela)</option>
                    <option value="TS001">TS001 (Oficina)</option>
                    <option value="TS-DI">TS-DI (Oficina DI)</option>
                    <option value="TS-HGV">TS-HGV (Hospital General)</option>
                </select>
            </div>
            <div class="w-48">
                <label class="flex items-center gap-2 p-2 border rounded-lg bg-slate-50 cursor-pointer hover:bg-slate-100">
                    <input type="checkbox" id="f_solo_calib" onchange="aplicarFiltros()" class="w-4 h-4">
                    <span class="text-sm font-semibold text-slate-700">Solo Calibrables</span>
                </label>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6">
            <section id="sec-inventario">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Equipo</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">GFH</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Última Calibración</th>
                                <th class="p-4 text-xs font-bold text-slate-500 uppercase">Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-calendario" class="hidden h-full">
                <div class="bg-white p-6 rounded-xl shadow-sm border h-full" id="calendar-container"></div>
            </section>
        </div>
    </main>

    <script>
        const _URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const _KEY = 'TU_CLAVE_ANON_AQUI'; // PON TU CLAVE AQUÍ
        const client = supabase.createClient(_URL, _KEY);
        let calendar;

        function showSection(id) {
            document.getElementById('sec-inventario').classList.add('hidden');
            document.getElementById('sec-calendario').classList.add('hidden');
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'calendario') initCalendar();
        }

        function aplicarFiltros() {
            cargarTabla();
            if(calendar) calendar.refetchEvents(); // Recarga el calendario con los nuevos filtros
        }

        function buildQuery() {
            const f_gen = document.getElementById('f_general').value;
            const f_gfh = document.getElementById('f_gfh').value;
            const soloCalib = document.getElementById('f_solo_calib').checked;

            let query = client.from('equipos').select('*');
            if (f_gen) query = query.or(`Código.ilike.%${f_gen}%,Nombre.ilike.%${f_gen}%`);
            if (f_gfh) query = query.ilike('GFH', `%${f_gfh}%`);
            if (soloCalib) query = query.eq('Equipos con calibración', 'Sí');
            
            return query;
        }

        async function cargarTabla() {
            const body = document.getElementById('tabla-body');
            body.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</td></tr>';
            
            const { data, error } = await buildQuery().limit(100);
            if (error) return body.innerHTML = `<tr><td colspan="4" class="text-red-500">${error.message}</td></tr>`;

            body.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition-colors text-sm">
                    <td class="p-4 font-medium">${item.Nombre || '-'} <br><span class="text-[10px] text-blue-500 font-mono">${item.Código || '-'}</span></td>
                    <td class="p-4 text-slate-600">${item.GFH || '-'}</td>
                    <td class="p-4 font-mono text-slate-500">${item['Fecha cal.'] || '-'}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold">${item.Estado || 'S/D'}</span></td>
                </tr>
            `).join('');
        }

        function initCalendar() {
            const calEl = document.getElementById('calendar-container');
            if(calendar) calendar.destroy();
            
            calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
                events: async function(info, success, failure) {
                    // Usamos la misma query de los filtros, pero filtramos los que no tienen fecha
                    const { data } = await buildQuery().not('"Fecha cal."', 'is', null);
                    
                    const evts = data.filter(e => e['Fecha cal.'] && e['Fecha cal.'] !== '-').map(e => {
                        const p = e['Fecha cal.'].split('/');
                        if(p.length === 3) {
                            const fechaBase = new Date(p[2], p[1]-1, p[0]);
                            fechaBase.setFullYear(fechaBase.getFullYear() + 1); // +1 Año
                            return { title: e.Nombre, start: fechaBase.toISOString().split('T')[0], color: '#ef4444' };
                        }
                        return null;
                    }).filter(e => e !== null);
                    
                    success(evts);
                }
            });
            calendar.render();
        }

        async function logout() { await client.auth.signOut(); location.href='index.html'; }
        cargarTabla();
    </script>
</body>
</html>
