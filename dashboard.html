<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mansis Lab - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-xl font-bold text-blue-400">Mansis Lab</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('inventario')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-list w-5"></i> Inventario
            </button>
            <button onclick="showSection('calendario')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-calendar-days w-5"></i> Calendario Cal.
            </button>
            <button onclick="location.href='settings.html'" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3">
                <i class="fa-solid fa-users-gear w-5"></i> Ajustes / Usuarios
            </button>
        </nav>
        <button onclick="logout()" class="p-6 text-slate-400 hover:text-white text-left">
            <i class="fa-solid fa-power-off mr-2"></i> Salir
        </button>
    </aside>

    <main class="flex-1 p-8">
        <section id="sec-inventario">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Gestión de Equipos</h2>
                <div class="flex gap-2">
                    <input type="text" id="busqueda" oninput="cargarDatos()" placeholder="Buscar código o nombre..." class="p-2 border rounded-lg text-sm w-64">
                    <label class="flex items-center gap-2 bg-white px-3 border rounded-lg text-sm cursor-pointer">
                        <input type="checkbox" id="f_solo_calib" onchange="cargarDatos()"> Calibrables
                    </label>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Equipo</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">GFH</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Últ. Cal.</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Estado</th>
                            <th class="p-4 text-xs font-bold text-slate-500 uppercase">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-calendario" class="hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Calendario de Caducidades</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border" id="calendar-container"></div>
        </section>
    </main>

    <div id="modal-edit" class="fixed inset-0 bg-black/50 hidden z-50 flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Editar Equipo</h3>
                <button onclick="closeEdit()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="form-equipo" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Nombre</label>
                    <input type="text" id="edit-nombre" class="w-full p-2 border rounded-lg bg-slate-50" readonly>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Última Fecha Calibración</label>
                    <input type="text" id="edit-fecha" placeholder="DD/MM/YYYY" class="w-full p-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Estado</label>
                    <select id="edit-estado" class="w-full p-2 border rounded-lg">
                        <option value="DISPONIBLE">DISPONIBLE</option>
                        <option value="EN REPARACIÓN">EN REPARACIÓN</option>
                        <option value="BAJA">BAJA</option>
                    </select>
                </div>
                <button type="button" onclick="guardarCambios()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 mt-4">Guardar Cambios</button>
            </form>
        </div>
    </div>

    <script>
        const _URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const _KEY = 'TU_CLAVE_ANON_AQUI'; 
        const client = supabase.createClient(_URL, _KEY);
        let calendar;

        function showSection(id) {
            document.getElementById('sec-inventario').classList.add('hidden');
            document.getElementById('sec-calendario').classList.add('hidden');
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(id === 'calendario') initCalendar();
        }

        async function cargarDatos() {
            const body = document.getElementById('tabla-body');
            const search = document.getElementById('busqueda').value;
            const soloCalib = document.getElementById('f_solo_calib').checked;

            let query = client.from('equipos').select('*');
            if(search) query = query.or(`Código.ilike.%${search}%,Nombre.ilike.%${search}%`);
            if(soloCalib) query = query.eq('Equipos con calibración', 'Sí');

            const { data } = await query.limit(50);
            body.innerHTML = data.map(item => `
                <tr class="text-sm">
                    <td class="p-4 font-medium">${item.Nombre} <br><span class="text-[10px] text-blue-500 font-mono">${item.Código}</span></td>
                    <td class="p-4 text-slate-500">${item.GFH || '-'}</td>
                    <td class="p-4">${item['Fecha cal.'] || '-'}</td>
                    <td class="p-4"><span class="px-2 py-0.5 rounded-full text-[10px] bg-slate-100">${item.Estado || 'S/D'}</span></td>
                    <td class="p-4">
                        <button onclick='openEdit(${JSON.stringify(item)})' class="text-blue-600 hover:bg-blue-50 p-2 rounded-lg">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function initCalendar() {
            const calEl = document.getElementById('calendar-container');
            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                events: async function(info, success, failure) {
                    const { data } = await client.from('equipos').select('Nombre, "Fecha cal."').not('"Fecha cal."', 'is', null);
                    const evts = data.map(e => {
                        const p = e['Fecha cal.'].split('/');
                        const fechaBase = new Date(p[2], p[1]-1, p[0]);
                        fechaBase.setFullYear(fechaBase.getFullYear() + 1); // Suma 1 año
                        return { title: 'EXP: ' + e.Nombre, start: fechaBase.toISOString().split('T')[0], color: '#ef4444' };
                    });
                    success(evts);
                }
            });
            calendar.render();
        }

        function openEdit(item) {
            document.getElementById('edit-id').value = item.id; // Asegúrate de que tu tabla tiene columna 'id'
            document.getElementById('edit-nombre').value = item.Nombre;
            document.getElementById('edit-fecha').value = item['Fecha cal.'] || '';
            document.getElementById('edit-estado').value = item.Estado || 'DISPONIBLE';
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function closeEdit() { document.getElementById('modal-edit').classList.add('hidden'); }

        async function guardarCambios() {
            const id = document.getElementById('edit-id').value;
            const nuevaFecha = document.getElementById('edit-fecha').value;
            const nuevoEstado = document.getElementById('edit-estado').value;

            const { error } = await client.from('equipos')
                .update({ 'Fecha cal.': nuevaFecha, 'Estado': nuevoEstado })
                .eq('id', id);

            if(error) alert("Error al guardar: " + error.message);
            else { alert("Guardado con éxito"); closeEdit(); cargarDatos(); }
        }

        async function logout() { await client.auth.signOut(); location.href='index.html'; }
        cargarDatos();
    </script>
</body>
</html>
