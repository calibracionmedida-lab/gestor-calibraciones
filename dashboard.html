<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mansis Lab - Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style>
        @keyframes heartbeat-text {
            0%, 100% { color: #dc2626; transform: scale(1); }
            50% { color: #f87171; transform: scale(1.05); }
        }
        .animate-text-red {
            display: inline-block;
            animation: heartbeat-text 1.2s infinite;
            font-weight: 900;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex antialiased text-slate-700">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen z-20 shadow-xl">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/50">
                <i class="fa-solid fa-microchip text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-black text-blue-400 font-mono tracking-tighter">Mansis Lab</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showSection('inventario')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/60 transition-all flex items-center gap-3 active:scale-95 group">
                <i class="fa-solid fa-list w-6 text-center text-blue-400 group-hover:scale-110 transition-transform"></i> Inventario
            </button>
            <button onclick="showSection('calendario')" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800/60 transition-all flex items-center gap-3 active:scale-95 group">
                <i class="fa-solid fa-calendar-days w-6 text-center text-blue-400 group-hover:scale-110 transition-transform"></i> Calendario
            </button>

            <div id="menu-admin" class="hidden border-t border-slate-800 mt-5 pt-5 space-y-2">
                <p class="text-[10px] font-black text-slate-500 uppercase px-3 mb-2 tracking-widest">Administración</p>
                <button onclick="location.href='settings.html'" class="w-full text-left p-3.5 rounded-xl hover:bg-slate-800 flex items-center gap-3 transition-colors text-slate-300">
                    <i class="fa-solid fa-users-gear w-6 text-center text-slate-400"></i> Ajustes y SMTP
                </button>
            </div>
        </nav>
        <button onclick="logout()" class="p-6 text-slate-400 hover:text-red-400 border-t border-slate-800 transition-colors flex items-center gap-3 text-sm">
            <i class="fa-solid fa-power-off"></i> Cerrar Sesión
        </button>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <div class="bg-white p-4 border-b border-slate-200 shadow-sm flex gap-4 items-end z-10 sticky top-0">
            <div class="flex-1">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-wider">Buscador Inteligente</label>
                <input type="text" id="f_general" oninput="renderTabla()" placeholder="Nombre, Código o GFH..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-300">
            </div>
            <div class="w-56">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 ml-1 tracking-wider">Filtrar por Centro</label>
                <select id="f_gfh" onchange="renderTabla()" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer font-medium text-sm">
                    <option value="">TODOS</option>
                    <option value="TS-L5">TS-L5</option>
                    <option value="TS-L7">TS-L7</option>
                    <option value="TS-L15">TS-L15</option>
                    <option value="TS-L17">TS-L17</option>
                </select>
            </div>
            <label class="flex items-center gap-2 cursor-pointer select-none h-10 px-4 rounded-xl border border-slate-200 bg-slate-50 text-xs font-bold text-slate-600 hover:bg-slate-100 transition-all">
                <input type="checkbox" id="f_calibracion" onchange="renderTabla()" class="w-4 h-4 accent-blue-600 cursor-pointer">
                Solo con calibración
            </label>
            <div class="flex items-end pb-1">
                <button id="btn-alertas" onclick="toggleAlertas()" class="h-10 px-5 rounded-xl border border-red-200 text-red-600 font-bold text-xs hover:bg-red-50 transition-all flex items-center gap-2 group shadow-sm active:scale-95">
                    <i class="fa-solid fa-triangle-exclamation group-hover:animate-ping"></i> REQUIEREN CALIBRACIÓN
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6">
            <section id="sec-inventario">
                <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden">
                    <table class="w-full text-left border-collapse table-auto">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-4 text-[11px] font-black text-slate-400 uppercase tracking-wider">Equipo / Código</th>
                                <th class="p-4 text-[11px] font-black text-slate-400 uppercase tracking-wider">Ubicación / GFH</th>
                                <th class="p-4 text-[11px] font-black text-slate-400 uppercase tracking-wider text-center">Última Calibración</th>
                                <th class="p-4 text-[11px] font-black text-slate-400 uppercase tracking-wider">Próxima Revisión</th>
                                <th class="p-4 text-[11px] font-black text-slate-400 uppercase tracking-wider text-center">Ajustes</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body" class="divide-y divide-slate-100 text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-calendario" class="hidden h-[85vh]">
                <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 h-full">
                    <div id="calendar-container" class="h-full"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="modal-edit" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex justify-end backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl animate-[slideIn_0.3s_ease-out] flex flex-col">
            <div class="flex justify-between items-center mb-10 border-b border-slate-100 pb-5">
                <div>
                    <h3 class="text-3xl font-black text-slate-800 tracking-tighter">Ajustar Equipo</h3>
                    <p id="edit-nombre" class="text-sm text-slate-400 mt-1"></p>
                </div>
                <button onclick="closeEdit()" class="text-slate-300 hover:text-red-500 transition-colors">
                    <i class="fa-solid fa-circle-xmark text-3xl"></i>
                </button>
            </div>

            <div class="space-y-8 flex-1">
                <input type="hidden" id="edit-id">

                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-wider">Última Calibración</label>
                    <input type="date" id="edit-fecha"
                        class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-white text-sm font-bold">
                    <p class="text-xs text-slate-400 mt-2 italic">Esta fecha se guardará en la tabla equipos.</p>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-wider">Periodicidad de Calibración</label>
                    <div class="flex gap-2.5">
                        <input type="number" id="peri-valor" value="12" min="1"
                            class="w-28 p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-center text-lg font-black bg-white">
                        <select id="peri-unidad" class="flex-1 p-4 border border-slate-200 rounded-2xl bg-white outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-700">
                            <option value="1">Meses</option>
                            <option value="12">Años</option>
                        </select>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-3 bg-slate-100 p-3 rounded-xl italic">
                        * El sistema calculará la próxima fecha sumando este tiempo a la última calibración de Mansis.
                    </p>
                </div>

                <div>
                    <label class="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-wider">Notas (opcional)</label>
                    <textarea id="edit-notas" rows="3" placeholder="Observaciones sobre esta calibración..."
                        class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-sm resize-none"></textarea>
                </div>

                <button type="button" onclick="guardarCambios()"
                    class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95">
                    Guardar Cambios y Recalcular
                </button>
                <p id="edit-msg" class="text-sm font-bold text-center"></p>
            </div>
        </div>
    </div>

    <script>
        const _URL = 'https://vefxssymaocbdtuupdwh.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZnhzc3ltYW9jYmR0dXVwZHdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDg4NDcsImV4cCI6MjA5MDAyNDg0N30.inKq_vCajv8xxTzCDQYaFEMOckUWJZF0plgCBA4YPEo';
        const client = supabase.createClient(_URL, _KEY);

        let calendar;
        let filtroAlertas = false;
        let listadoEquipos = [];
        let configEquipos = {};

        async function checkUser() {
            const { data: { user }, error } = await client.auth.getUser();
            if (error || !user) { window.location.href = 'index.html'; return; }
            const meta = user.user_metadata || user.raw_user_meta_data || {};
            if (meta.role === 'admin') {
                document.getElementById('menu-admin').classList.remove('hidden');
            }
        }

        function calcularProxima(fechaStr, mesesTotales = 12) {
            if (!fechaStr || fechaStr === '-' || fechaStr === 'No') {
                return { fecha: 'Pendiente', clase: 'text-slate-300 italic font-medium', caducado: false, proximo: false, obj: null };
            }
            try {
                const p = fechaStr.split('/');
                const fecha = new Date(p[2], p[1] - 1, p[0]);
                fecha.setMonth(fecha.getMonth() + parseInt(mesesTotales));
                const hoy = new Date();
                const diffDias = (fecha - hoy) / (1000 * 60 * 60 * 24);
                let clase = 'text-green-600 font-bold';
                let esPasado = false;
                let esProximo = false;
                if (fecha < hoy) {
                    clase = 'animate-text-red';
                    esPasado = true;
                } else if (diffDias <= 60) {
                    clase = 'text-orange-500 font-bold';
                    esProximo = true;
                }
                return { fecha: fecha.toLocaleDateString('es-ES'), clase, caducado: esPasado, proximo: esProximo, obj: fecha };
            } catch(e) {
                return { fecha: 'Error Fecha', clase: 'text-red-500 font-bold', caducado: false, proximo: false, obj: null };
            }
        }

        async function cargarDatos() {
            const body = document.getElementById('tabla-body');
            body.innerHTML = '<tr><td colspan="5" class="p-10 text-center"><i class="fa-solid fa-sync fa-spin text-blue-500 text-2xl"></i></td></tr>';

            const [resEquipos, resConfig] = await Promise.all([
                client.from('equipos').select('*'),
                client.from('equipos_config').select('*')
            ]);

            if (resEquipos.error) {
                body.innerHTML = `<tr><td colspan="5" class="p-5 text-center text-red-600 font-bold bg-red-50">Error: ${resEquipos.error.message}</td></tr>`;
                return;
            }

            configEquipos = {};
            (resConfig.data || []).forEach(c => {
                configEquipos[c.codigo] = c;
            });

            listadoEquipos = resEquipos.data || [];
            renderTabla();
        }

        function renderTabla() {
            const body = document.getElementById('tabla-body');
            if (listadoEquipos.length === 0) return;

            const f_gen = document.getElementById('f_general').value.toLowerCase().trim();
            const f_gfh = document.getElementById('f_gfh').value;
            const f_cal = document.getElementById('f_calibracion').checked;

            const filtrados = listadoEquipos.filter(item => {
                const config = configEquipos[item['Código']] || {};
                const periodo = config.periodo_meses || 12;
                const prox = calcularProxima(item['Fecha cal.'], periodo);
                const okBusqueda = !f_gen ||
                    (item['Nombre'] && item['Nombre'].toLowerCase().includes(f_gen)) ||
                    (item['Código'] && item['Código'].toLowerCase().includes(f_gen)) ||
                    (item['GFH'] && item['GFH'].toLowerCase().includes(f_gen));
                const okCentro = !f_gfh || (item['GFH'] && item['GFH'].includes(f_gfh));
                const okAlerta = !filtroAlertas || prox.caducado || prox.proximo;
                const okCalib = !f_cal || item['Equipos con calibración'] === 'Sí';
                return okBusqueda && okCentro && okAlerta && okCalib;
            });

            if (filtrados.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400 italic">No se han encontrado equipos con estos filtros.</td></tr>';
                return;
            }

            body.innerHTML = filtrados.map(item => {
                const config = configEquipos[item['Código']] || {};
                const periodo = config.periodo_meses || 12;
                const prox = calcularProxima(item['Fecha cal.'], periodo);
                const periodoTexto = periodo % 12 === 0 ? `${periodo / 12} año(s)` : `${periodo} mes(es)`;
                return `
                <tr class="hover:bg-blue-50/40 transition-colors group">
                    <td class="p-4">
                        <div class="font-bold text-slate-800 text-base">${item['Nombre'] || '-'}</div>
                        <div class="text-[10px] font-mono text-blue-500 bg-blue-50 px-1.5 py-0.5 rounded inline-block mt-0.5">${item['Código']}</div>
                    </td>
                    <td class="p-4 text-sm text-slate-600 font-medium">${item['GFH'] || '-'}</td>
                    <td class="p-4 text-xs font-mono text-slate-400 text-center">${item['Fecha cal.'] || '-'}</td>
                    <td class="p-4 text-sm">
                        <span class="${prox.clase}">${prox.fecha}</span>
                        <div class="text-[10px] text-slate-400 mt-0.5">cada ${periodoTexto}</div>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick='openEdit(${JSON.stringify(item)})' class="text-slate-300 hover:text-blue-600 p-2.5 rounded-xl hover:bg-blue-100 transition-all active:scale-95">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function toggleAlertas() {
            filtroAlertas = !filtroAlertas;
            const btn = document.getElementById('btn-alertas');
            if (filtroAlertas) {
                btn.classList.add('bg-red-600', 'text-white');
                btn.innerHTML = '<i class="fa-solid fa-filter-circle-xmark"></i> QUITAR FILTRO';
            } else {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> REQUIEREN CALIBRACIÓN';
            }
            renderTabla();
        }

        function initCalendar() {
            const container = document.getElementById('calendar-container');
            if (calendar) calendar.destroy();
            const f_gen = document.getElementById('f_general').value.toLowerCase().trim();
            const f_gfh = document.getElementById('f_gfh').value;
            const f_cal = document.getElementById('f_calibracion').checked;

            calendar = new FullCalendar.Calendar(container, {
                initialView: 'dayGridMonth',
                locale: 'es',
                firstDay: 1,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: (info, success) => {
                    const eventos = listadoEquipos
                        .filter(item => {
                            const okBusqueda = !f_gen ||
                                (item['Nombre'] && item['Nombre'].toLowerCase().includes(f_gen)) ||
                                (item['Código'] && item['Código'].toLowerCase().includes(f_gen));
                            const okCentro = !f_gfh || (item['GFH'] && item['GFH'].includes(f_gfh));
                            const okCalib = !f_cal || item['Equipos con calibración'] === 'Sí';
                            return okBusqueda && okCentro && okCalib && item['Equipos con calibración'] === 'Sí';
                        })
                        .map(item => {
                            const config = configEquipos[item['Código']] || {};
                            const prox = calcularProxima(item['Fecha cal.'], config.periodo_meses || 12);
                            if (!prox.obj) return null;
                            return {
                                title: `${item['Nombre']} (${item['Código']})`,
                                start: prox.obj.toISOString().split('T')[0],
                                color: prox.caducado ? '#ef4444' : prox.proximo ? '#f97316' : '#10b981',
                                extendedProps: { codigo: item['Código'], centro: item['GFH'] }
                            };
                        }).filter(Boolean);
                    success(eventos);
                },
                eventClick: (info) => {
                    alert(`Equipo: ${info.event.title}\nCódigo: ${info.event.extendedProps.codigo}\nCentro: ${info.event.extendedProps.centro}`);
                }
            });
            calendar.render();
        }

        function showSection(id) {
            document.getElementById('sec-inventario').classList.toggle('hidden', id !== 'inventario');
            document.getElementById('sec-calendario').classList.toggle('hidden', id !== 'calendario');
            if (id === 'calendario') setTimeout(() => initCalendar(), 100);
        }

        function fechaESaISO(fechaStr) {
            if (!fechaStr || fechaStr === '-' || fechaStr === 'No') return '';
            const p = fechaStr.split('/');
            if (p.length !== 3) return '';
            const d = p[0].padStart(2, '0');
            const m = p[1].padStart(2, '0');
            const y = p[2];
            return `${y}-${m}-${d}`;
        }

        function fechaISOaES(isoStr) {
            if (!isoStr) return '';
            const p = isoStr.split('-');
            if (p.length !== 3) return '';
            return `${p[2]}/${p[1]}/${p[0]}`;
        }

        function openEdit(item) {
            const codigo = item['Código'];
            const config = configEquipos[codigo] || {};
            const periodo = config.periodo_meses || 12;

            document.getElementById('edit-id').value = codigo;
            document.getElementById('edit-nombre').innerText = item['Nombre'] || codigo;
            document.getElementById('edit-fecha').value = fechaESaISO(item['Fecha cal.']);
            document.getElementById('edit-notas').value = config.notas || '';
            document.getElementById('edit-msg').innerText = '';

            if (periodo % 12 === 0) {
                document.getElementById('peri-valor').value = periodo / 12;
                document.getElementById('peri-unidad').value = '12';
            } else {
                document.getElementById('peri-valor').value = periodo;
                document.getElementById('peri-unidad').value = '1';
            }

            document.getElementById('modal-edit').classList.remove('hidden');
        }

        async function guardarCambios() {
    const codigo = document.getElementById('edit-id').value;
    const valor = parseInt(document.getElementById('peri-valor').value);
    const unidad = parseInt(document.getElementById('peri-unidad').value);
    const mesesTotales = valor * unidad;
    const notas = document.getElementById('edit-notas').value.trim();
    const fechaISO = document.getElementById('edit-fecha').value;
    const fechaCal = fechaISO ? fechaISOaES(fechaISO) : null;
    const msg = document.getElementById('edit-msg');

    msg.innerText = 'Guardando...';
    msg.className = 'text-sm font-bold text-center text-blue-500';

    const { data: { user } } = await client.auth.getUser();

    const { error: errorConfig } = await client
        .from('equipos_config')
        .upsert({
            codigo,
            periodo_meses: mesesTotales,
            notas,
            updated_at: new Date().toISOString(),
            updated_by: user?.id || null
        }, { onConflict: 'codigo' });

    if (errorConfig) {
        msg.innerText = 'Error al guardar configuración: ' + errorConfig.message;
        msg.className = 'text-sm font-bold text-center text-red-500';
        return;
    }

    if (fechaCal !== null) {
        const { data: filas, error: errorFecha } = await client
            .from('equipos')
            .update({ 'Fecha cal.': fechaCal })
            .eq('Código', codigo)
            .select('Código');

        if (errorFecha) {
            msg.innerText = 'Error al guardar fecha: ' + errorFecha.message;
            msg.className = 'text-sm font-bold text-center text-red-500';
            return;
        }

        if (!filas || filas.length === 0) {
            msg.innerText = 'No se actualizó ninguna fila. Revisa RLS o el nombre exacto de la columna.';
            msg.className = 'text-sm font-bold text-center text-amber-600';
            return;
        }
    }

    msg.innerText = '✅ Guardado correctamente';
    msg.className = 'text-sm font-bold text-center text-green-600';

    listadoEquipos = listadoEquipos.map(e =>
        e['Código'] === codigo ? { ...e, 'Fecha cal.': fechaCal } : e
    );
    configEquipos[codigo] = { codigo, periodo_meses: mesesTotales, notas };

    setTimeout(() => {
        closeEdit();
        renderTabla();
    }, 800);
}
        function closeEdit() {
            document.getElementById('modal-edit').classList.add('hidden');
        }

        async function logout() {
            await client.auth.signOut();
            location.href = 'index.html';
        }

        function setupCalendarFilterListeners() {
            ['f_general', 'f_gfh', 'f_calibracion'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if (!document.getElementById('sec-calendario').classList.contains('hidden')) initCalendar();
                });
            });
        }

        checkUser();
        cargarDatos();
        setupCalendarFilterListeners();
    </script>
</body>
</html>
